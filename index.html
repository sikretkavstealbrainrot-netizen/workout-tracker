<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Workout Tracker | Личный дневник</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #eef2f5;
            padding: 16px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 36px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
            padding: 24px;
        }
        .page { transition: 0.2s; }
        .hidden { display: none !important; }
        .logo { text-align: center; margin-bottom: 20px; }
        .logo h1 { color: #3b82f6; }
        .tabs { display: flex; gap: 12px; margin-bottom: 24px; }
        .tab-btn {
            flex: 1;
            background: #e2e8f0;
            border: none;
            padding: 12px;
            border-radius: 48px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
        }
        .tab-btn.active { background: #3b82f6; color: white; }
        .form-card {
            background: #f8fafc;
            border-radius: 28px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        input, select {
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 32px;
            font-size: 1rem;
            outline: none;
        }
        input:focus { border-color: #3b82f6; }
        button {
            background: #3b82f6;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: #2563eb; }
        .btn-outline { background: transparent; border: 1px solid #cbd5e1; color: #1e293b; }
        .btn-add { background: #10b981; width: fit-content; }
        .error-msg { color: #ef4444; text-align: center; font-size: 0.9rem; }
        .app-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
        .stats-section { background: #ffffff; border-radius: 28px; padding: 16px; margin-bottom: 28px; border: 1px solid #e2e8f0; }
        .stat-controls { display: flex; flex-wrap: wrap; gap: 12px; margin: 12px 0; justify-content: space-between; align-items: center; }
        .time-buttons { display: flex; gap: 8px; }
        .period-btn { background: #e2e8f0; color: #1e293b; padding: 6px 12px; font-size: 0.8rem; }
        .period-btn.active { background: #3b82f6; color: white; }
        .chart-hint { font-size: 0.75rem; color: #64748b; margin-top: 8px; text-align: center; }
        .exercises-grid { display: flex; flex-direction: column; gap: 16px; margin-top: 16px; }
        .exercise-card {
            background: #fefce8;
            border-left: 6px solid #3b82f6;
            border-radius: 24px;
            padding: 16px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        .exercise-info { flex: 3; }
        .exercise-name { font-weight: 700; font-size: 1.2rem; }
        .exercise-details { color: #334155; font-size: 0.9rem; margin-top: 4px; }
        .exercise-photo img { max-width: 70px; max-height: 70px; border-radius: 16px; object-fit: cover; }
        .exercise-actions { display: flex; gap: 8px; }
        .edit-btn { background: #f59e0b; }
        .delete-btn { background: #ef4444; }
        .photo-upload { display: flex; flex-direction: column; gap: 8px; }
        #photoPreview img { max-width: 80px; border-radius: 12px; margin-top: 6px; }
        .form-buttons { display: flex; gap: 12px; }
        @media (max-width: 640px) {
            .exercise-card { flex-direction: column; align-items: flex-start; }
            .exercise-actions { align-self: flex-end; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- СТРАНИЦА АВТОРИЗАЦИИ -->
    <div id="authPage">
        <div class="logo">
            <h1>💪 Workout Tracker</h1>
            <p>Твой личный дневник</p>
        </div>
        <div class="tabs">
            <button id="loginTabBtn" class="tab-btn active">Вход</button>
            <button id="registerTabBtn" class="tab-btn">Регистрация</button>
        </div>
        <div id="loginForm" class="form-card">
            <input type="text" id="loginUsername" placeholder="Имя пользователя">
            <input type="password" id="loginPassword" placeholder="Пароль">
            <button id="doLoginBtn">Войти</button>
            <p class="error-msg" id="authError"></p>
        </div>
        <div id="registerForm" class="form-card hidden">
            <input type="text" id="regUsername" placeholder="Придумайте ник (мин 3 символа)">
            <input type="password" id="regPassword" placeholder="Пароль (мин 3 символа)">
            <button id="doRegisterBtn">Создать аккаунт</button>
            <p class="error-msg" id="regError"></p>
        </div>
    </div>

    <!-- ГЛАВНОЕ ПРИЛОЖЕНИЕ -->
    <div id="appPage" class="hidden">
        <div class="app-header">
            <h2>🏋️‍♂️ <span id="currentUser"></span></h2>
            <button id="logoutBtn" class="btn-outline">Выйти</button>
        </div>

        <div class="stats-section">
            <h3>📈 Прогресс упражнения</h3>
            <div class="stat-controls">
                <select id="exerciseSelect"></select>
                <div class="time-buttons">
                    <button data-period="week" class="period-btn active">Неделя</button>
                    <button data-period="month" class="period-btn">Месяц</button>
                    <button data-period="year" class="period-btn">Год</button>
                </div>
            </div>
            <canvas id="progressChart" width="400" height="200" style="max-width:100%; height:auto;"></canvas>
            <p class="chart-hint">* Максимальный вес за тренировку</p>
        </div>

        <div class="exercises-section">
            <h3>📋 Мои упражнения</h3>
            <button id="showAddFormBtn" class="btn-add">+ Добавить упражнение</button>

            <div id="exerciseForm" class="form-card hidden">
                <h3 id="formTitle">Добавить упражнение</h3>
                <input type="text" id="exName" placeholder="Название (например, Жим лёжа)" required>
                <input type="number" id="exWeight" placeholder="Вес (кг)" step="0.5" required>
                <input type="number" id="exReps" placeholder="Количество повторений" required>
                <input type="number" id="exSets" placeholder="Количество подходов" required>
                <input type="date" id="exDate" required>
                <div class="photo-upload">
                    <label>📸 Фото (необязательно)</label>
                    <input type="file" id="exPhoto" accept="image/*">
                    <div id="photoPreview"></div>
                </div>
                <div class="form-buttons">
                    <button id="saveExerciseBtn">Сохранить</button>
                    <button id="cancelFormBtn">Отмена</button>
                </div>
                <p id="formError" class="error-msg"></p>
            </div>

            <div id="exercisesList" class="exercises-grid"></div>
        </div>
    </div>
</div>

<script>
    // ------------------- ХРАНИЛИЩЕ -------------------
    const STORAGE_KEY = 'workout_users_pro';

    function getUsers() {
        const data = localStorage.getItem(STORAGE_KEY);
        if (!data) return {};
        try { return JSON.parse(data); } catch(e) { return {}; }
    }
    function saveUsers(users) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
    }

    // Регистрация
    function register(username, password) {
        const users = getUsers();
        if (users[username]) return { success: false, error: 'Имя уже занято' };
        if (username.length < 3 || password.length < 3) return { success: false, error: 'Ник и пароль минимум 3 символа' };
        users[username] = { password: password, exercises: [] };
        saveUsers(users);
        return { success: true };
    }

    // Вход
    function login(username, password) {
        const users = getUsers();
        const user = users[username];
        if (user && user.password === password) return { success: true, username };
        return { success: false, error: 'Неверный логин или пароль' };
    }

    // Получить упражнения пользователя
    function getUserExercises(username) {
        const users = getUsers();
        if (!users[username]) return [];
        return users[username].exercises || [];
    }

    // Сохранить упражнения пользователя
    function setUserExercises(username, exercises) {
        const users = getUsers();
        if (users[username]) {
            users[username].exercises = exercises;
            saveUsers(users);
        }
    }

    // Добавить/обновить упражнение
    function saveExercise(username, exerciseData, editId = null) {
        let exercises = getUserExercises(username);
        if (editId) {
            const idx = exercises.findIndex(e => e.id == editId);
            if (idx !== -1) exercises[idx] = { ...exerciseData, id: editId };
        } else {
            exercises.push({ ...exerciseData, id: Date.now() });
        }
        setUserExercises(username, exercises);
    }

    // Удалить упражнение
    function deleteExercise(username, id) {
        let exercises = getUserExercises(username);
        exercises = exercises.filter(e => e.id != id);
        setUserExercises(username, exercises);
    }

    // ------------------- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ -------------------
    let currentUser = null;
    let editId = null;
    let chartInstance = null;

    // DOM элементы
    const authPage = document.getElementById('authPage');
    const appPage = document.getElementById('appPage');
    const loginFormDiv = document.getElementById('loginForm');
    const registerFormDiv = document.getElementById('registerForm');
    const loginTabBtn = document.getElementById('loginTabBtn');
    const registerTabBtn = document.getElementById('registerTabBtn');
    const doLoginBtn = document.getElementById('doLoginBtn');
    const doRegisterBtn = document.getElementById('doRegisterBtn');
    const authError = document.getElementById('authError');
    const regError = document.getElementById('regError');
    const logoutBtn = document.getElementById('logoutBtn');
    const currentUserSpan = document.getElementById('currentUser');
    const exercisesListDiv = document.getElementById('exercisesList');
    const exerciseFormDiv = document.getElementById('exerciseForm');
    const showAddFormBtn = document.getElementById('showAddFormBtn');
    const saveExerciseBtn = document.getElementById('saveExerciseBtn');
    const cancelFormBtn = document.getElementById('cancelFormBtn');
    const formTitle = document.getElementById('formTitle');
    const exName = document.getElementById('exName');
    const exWeight = document.getElementById('exWeight');
    const exReps = document.getElementById('exReps');
    const exSets = document.getElementById('exSets');
    const exDate = document.getElementById('exDate');
    const exPhoto = document.getElementById('exPhoto');
    const photoPreview = document.getElementById('photoPreview');
    const formError = document.getElementById('formError');
    const exerciseSelect = document.getElementById('exerciseSelect');
    const periodBtns = document.querySelectorAll('.period-btn');
    const progressChartCanvas = document.getElementById('progressChart');

    // ------------------- ОТРИСОВКА СПИСКА -------------------
    function renderExercisesList() {
        if (!currentUser) return;
        const exercises = getUserExercises(currentUser);
        if (exercises.length === 0) {
            exercisesListDiv.innerHTML = '<div class="form-card" style="text-align:center;">Нет упражнений. Добавьте первое!</div>';
            return;
        }
        exercisesListDiv.innerHTML = exercises.map(ex => `
            <div class="exercise-card">
                <div class="exercise-info">
                    <div class="exercise-name">${escapeHtml(ex.name)}</div>
                    <div class="exercise-details">
                        🏋️ ${ex.weight} кг | 🔁 ${ex.reps} повт | 📋 ${ex.sets} подходов | 📅 ${ex.date}
                    </div>
                </div>
                ${ex.photoUrl ? `<div class="exercise-photo"><img src="${ex.photoUrl}" alt="фото"></div>` : ''}
                <div class="exercise-actions">
                    <button class="edit-btn" data-id="${ex.id}">✏️ Изменить</button>
                    <button class="delete-btn" data-id="${ex.id}">🗑️ Удалить</button>
                </div>
            </div>
        `).join('');

        document.querySelectorAll('.edit-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                openEditForm(id);
            });
        });
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                if (confirm('Удалить упражнение?')) {
                    deleteExercise(currentUser, id);
                    refreshAll();
                }
            });
        });
    }

    function openEditForm(id) {
        const exercises = getUserExercises(currentUser);
        const ex = exercises.find(e => e.id === id);
        if (!ex) return;
        editId = id;
        formTitle.innerText = '✏️ Редактировать упражнение';
        exName.value = ex.name;
        exWeight.value = ex.weight;
        exReps.value = ex.reps;
        exSets.value = ex.sets;
        exDate.value = ex.date;
        photoPreview.innerHTML = ex.photoUrl ? `<img src="${ex.photoUrl}" style="max-width:80px;">` : '';
        exerciseFormDiv.classList.remove('hidden');
        exPhoto.value = '';
    }

    function resetForm() {
        editId = null;
        formTitle.innerText = '➕ Добавить упражнение';
        exName.value = '';
        exWeight.value = '';
        exReps.value = '';
        exSets.value = '';
        exDate.value = new Date().toISOString().slice(0,10);
        photoPreview.innerHTML = '';
        exPhoto.value = '';
        formError.innerText = '';
        exerciseFormDiv.classList.add('hidden');
    }

    // Получение фото base64
    function getPhotoBase64(file) {
        return new Promise((resolve) => {
            if (!file) return resolve(null);
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = () => resolve(null);
        });
    }

    async function handleSave() {
        if (!currentUser) return;
        const name = exName.value.trim();
        const weight = parseFloat(exWeight.value);
        const reps = parseInt(exReps.value);
        const sets = parseInt(exSets.value);
        const date = exDate.value;
        if (!name || isNaN(weight) || isNaN(reps) || isNaN(sets) || !date) {
            formError.innerText = 'Заполните все поля!';
            return;
        }
        let photoUrl = null;
        if (exPhoto.files.length > 0) {
            photoUrl = await getPhotoBase64(exPhoto.files[0]);
        } else if (editId) {
            const oldEx = getUserExercises(currentUser).find(e => e.id === editId);
            if (oldEx && oldEx.photoUrl) photoUrl = oldEx.photoUrl;
        }
        const exerciseData = { name, weight, reps, sets, date, photoUrl };
        saveExercise(currentUser, exerciseData, editId);
        resetForm();
        refreshAll();
    }

    // ------------------- ГРАФИК -------------------
    function updateExerciseSelect() {
        if (!currentUser) return;
        const exercises = getUserExercises(currentUser);
        const uniqueNames = [...new Map(exercises.map(ex => [ex.name, ex.name])).values()];
        exerciseSelect.innerHTML = '<option value="">-- Выберите упражнение --</option>' +
            uniqueNames.map(name => `<option value="${escapeHtml(name)}">${escapeHtml(name)}</option>`).join('');
        if (uniqueNames.length > 0 && !exerciseSelect.value) {
            exerciseSelect.value = uniqueNames[0];
            updateChart();
        } else {
            updateChart();
        }
    }

    function updateChart() {
        if (!currentUser) return;
        const exerciseName = exerciseSelect.value;
        if (!exerciseName) {
            if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
            return;
        }
        const period = document.querySelector('.period-btn.active')?.dataset.period || 'week';
        const exercises = getUserExercises(currentUser);
        const filtered = exercises.filter(ex => ex.name === exerciseName);
        if (filtered.length === 0) {
            if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
            return;
        }
        filtered.sort((a,b) => new Date(a.date) - new Date(b.date));
        const now = new Date();
        let fromDate = new Date();
        if (period === 'week') fromDate.setDate(now.getDate() - 7);
        else if (period === 'month') fromDate.setMonth(now.getMonth() - 1);
        else fromDate.setFullYear(now.getFullYear() - 1);

        const dataPoints = filtered.filter(ex => new Date(ex.date) >= fromDate);
        if (dataPoints.length === 0) {
            if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
            return;
        }
        const labels = dataPoints.map(ex => ex.date);
        const weights = dataPoints.map(ex => ex.weight);
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(progressChartCanvas, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: `Прогресс по ${exerciseName} (кг)`,
                    data: weights,
                    borderColor: '#3b82f6',
                    backgroundColor: 'rgba(59,130,246,0.1)',
                    tension: 0.2,
                    fill: true,
                    pointRadius: 5
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                scales: { y: { title: { display: true, text: 'Вес (кг)' } }, x: { title: { display: true, text: 'Дата' } } }
            }
        });
    }

    function refreshAll() {
        renderExercisesList();
        updateExerciseSelect();
    }

    // ------------------- АВТОРИЗАЦИЯ -------------------
    function onLoginSuccess(username) {
        currentUser = username;
        currentUserSpan.innerText = username;
        authPage.classList.add('hidden');
        appPage.classList.remove('hidden');
        refreshAll();
    }

    function logout() {
        currentUser = null;
        authPage.classList.remove('hidden');
        appPage.classList.add('hidden');
        resetForm();
        if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
    }

    // Обработчики
    doLoginBtn.addEventListener('click', () => {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;
        const res = login(username, password);
        if (res.success) {
            onLoginSuccess(username);
        } else {
            authError.innerText = res.error;
        }
    });

    doRegisterBtn.addEventListener('click', () => {
        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value;
        const res = register(username, password);
        if (res.success) {
            regError.innerText = '✅ Аккаунт создан! Теперь войдите.';
            loginTabBtn.click();
            document.getElementById('loginUsername').value = username;
            document.getElementById('loginPassword').value = '';
            authError.innerText = '';
        } else {
            regError.innerText = res.error;
        }
    });

    loginTabBtn.addEventListener('click', () => {
        loginTabBtn.classList.add('active');
        registerTabBtn.classList.remove('active');
        loginFormDiv.classList.remove('hidden');
        registerFormDiv.classList.add('hidden');
        authError.innerText = '';
        regError.innerText = '';
    });

    registerTabBtn.addEventListener('click', () => {
        registerTabBtn.classList.add('active');
        loginTabBtn.classList.remove('active');
        loginFormDiv.classList.add('hidden');
        registerFormDiv.classList.remove('hidden');
        authError.innerText = '';
        regError.innerText = '';
    });

    showAddFormBtn.addEventListener('click', () => {
        resetForm();
        exerciseFormDiv.classList.remove('hidden');
    });
    cancelFormBtn.addEventListener('click', resetForm);
    saveExerciseBtn.addEventListener('click', handleSave);
    logoutBtn.addEventListener('click', logout);

    exPhoto.addEventListener('change', (e) => {
        if (e.target.files.length) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                photoPreview.innerHTML = `<img src="${ev.target.result}" style="max-width:80px; border-radius:12px;">`;
            };
            reader.readAsDataURL(file);
        } else if (!editId) photoPreview.innerHTML = '';
    });

    periodBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            periodBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            updateChart();
        });
    });
    exerciseSelect.addEventListener('change', updateChart);

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, (m) => {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Старт
    authPage.classList.remove('hidden');
    appPage.classList.add('hidden');
</script>
</body>
</html>
