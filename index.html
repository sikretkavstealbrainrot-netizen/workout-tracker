<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Fitness PRO | Realtime + План с упражнениями</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', Roboto, sans-serif; }
        body { background: #eef2f5; padding: 16px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; border-radius: 36px; box-shadow: 0 12px 30px rgba(0,0,0,0.08); padding: 24px; }
        .hidden { display: none !important; }
        .logo { text-align: center; margin-bottom: 20px; }
        .logo h1 { color: #3b82f6; }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; border-bottom: 1px solid #e2e8f0; padding-bottom: 12px; }
        .tab-btn { background: #e2e8f0; border: none; padding: 8px 20px; border-radius: 40px; font-weight: 600; cursor: pointer; }
        .tab-btn.active { background: #3b82f6; color: white; }
        .form-card { background: #f8fafc; border-radius: 28px; padding: 20px; display: flex; flex-direction: column; gap: 14px; margin-bottom: 20px; }
        input, select { padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 32px; font-size: 1rem; outline: none; }
        button { background: #3b82f6; border: none; padding: 12px; border-radius: 40px; font-weight: 600; color: white; cursor: pointer; }
        button:hover { background: #2563eb; }
        .btn-outline { background: transparent; border: 1px solid #cbd5e1; color: #1e293b; }
        .btn-add { background: #10b981; width: fit-content; }
        .small-btn { padding: 8px 16px; font-size: 0.9rem; }
        .error-msg { color: #ef4444; text-align: center; }
        .app-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .card { background: #f8fafc; border-radius: 28px; padding: 20px; margin-bottom: 20px; }
        .stat-numbers { display: flex; flex-wrap: wrap; gap: 16px; margin: 15px 0; }
        .stat-item { background: white; border-radius: 24px; padding: 12px; text-align: center; flex: 1; min-width: 100px; }
        .stat-value { font-size: 1.8rem; font-weight: 700; color: #3b82f6; }
        .set-row { display: flex; gap: 12px; align-items: flex-end; margin: 12px 0; flex-wrap: wrap; background: #f1f5f9; padding: 12px; border-radius: 20px; }
        .set-row .field { display: flex; flex-direction: column; gap: 4px; }
        .set-row label { font-size: 0.75rem; font-weight: 600; color: #475569; }
        .set-row input { width: 100px; padding: 8px 10px; }
        .add-set-btn { background: #10b981; padding: 8px 16px; font-size: 0.9rem; }
        .remove-set-btn { background: #ef4444; padding: 6px 12px; }
        .exercise-card { background: #fefce8; border-left: 6px solid #3b82f6; border-radius: 24px; padding: 16px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 12px; }
        .exercise-photo img { max-width: 80px; border-radius: 16px; }
        .week-plan-day { background: #eef2ff; border-radius: 20px; padding: 12px; margin-bottom: 12px; }
        .plan-exercise-item { background: white; border-radius: 16px; padding: 8px 12px; margin: 6px 0; display: flex; justify-content: space-between; align-items: center; }
        .measure-row { display: flex; gap: 10px; align-items: center; margin: 10px 0; flex-wrap: wrap; }
        .muscle-group { background: white; border-radius: 24px; margin-bottom: 16px; border: 1px solid #e2e8f0; }
        .muscle-header { background: #3b82f6; color: white; padding: 14px 16px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .muscle-exercises { padding: 12px; display: none; max-height: 300px; overflow-y: auto; }
        .muscle-exercises.show { display: block; }
        .ex-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; border-bottom: 1px solid #f1f5f9; }
        .favorite-star { font-size: 1.4rem; cursor: pointer; background: none; border: none; }
        .favorite-star.active { color: #f59e0b; }
        .add-ex-to-group { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
        .add-ex-to-group input { flex: 1; }
        .add-group { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .add-group input { flex: 1; }
        .form-buttons { display: flex; gap: 12px; }
        #photoPreview img { max-width: 100px; border-radius: 12px; }
        .sync-status { display: inline-flex; align-items: center; gap: 6px; font-size: 0.75rem; padding: 4px 12px; background: #dcfce7; color: #166534; border-radius: 40px; }
        .plan-exercise-add { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        .remove-plan-ex { background: #ef4444; padding: 4px 8px; font-size: 0.7rem; }
        @media (max-width: 700px) { .set-row { flex-direction: column; align-items: stretch; } .set-row input { width: 100%; } }
    </style>
</head>
<body>
<div class="container">
    <div id="authPage">
        <div class="logo"><h1>💪 Fitness PRO</h1><p>План тренировок с упражнениями</p></div>
        <div class="tabs">
            <button id="loginTabBtn" class="tab-btn active">Вход</button>
            <button id="registerTabBtn" class="tab-btn">Регистрация</button>
        </div>
        <div id="loginForm" class="form-card">
            <input type="text" id="loginUsername" placeholder="Логин">
            <input type="password" id="loginPassword" placeholder="Пароль">
            <button id="doLoginBtn">Войти</button>
            <p class="error-msg" id="authError"></p>
        </div>
        <div id="registerForm" class="form-card hidden">
            <input type="text" id="regUsername" placeholder="Логин">
            <input type="password" id="regPassword" placeholder="Пароль">
            <button id="doRegisterBtn">Создать аккаунт</button>
            <p class="error-msg" id="regError"></p>
        </div>
    </div>

    <div id="appPage" class="hidden">
        <div class="app-header">
            <h2>🏋️ <span id="currentUser"></span> <span id="syncStatus" class="sync-status">☁️ Синхронизировано</span></h2>
            <button id="logoutBtn" class="btn-outline">Выйти</button>
        </div>

        <div class="tabs">
            <button data-tab="exercises" class="tab-btn active">🏋️ Тренировки</button>
            <button data-tab="stats" class="tab-btn">📊 Статистика</button>
            <button data-tab="plan" class="tab-btn">📅 План</button>
            <button data-tab="body" class="tab-btn">📏 Замеры</button>
            <button data-tab="muscles" class="tab-btn">💪 Группы мышц</button>
            <button data-tab="favorites" class="tab-btn">⭐ Избранное</button>
        </div>

        <div id="tabExercises" class="tab-content">
            <button id="showWorkoutFormBtn" class="btn-add">+ Записать тренировку</button>
            <div id="workoutForm" class="form-card hidden">
                <h3>Новая тренировка</h3>
                <select id="workoutMuscleGroup"><option value="">-- Выберите группу --</option></select>
                <select id="workoutExerciseSelect"><option value="">-- Выберите упражнение --</option></select>
                <input type="date" id="workoutDate">
                <div id="setsContainer"></div>
                <button type="button" id="addSetBtn" class="add-set-btn">+ Добавить подход</button>
                <div><label>📸 Фото</label><input type="file" id="workoutPhoto" accept="image/*"><div id="photoPreview"></div></div>
                <div class="form-buttons"><button id="saveWorkoutBtn">Сохранить</button><button id="cancelWorkoutBtn" class="btn-outline">Отмена</button></div>
                <p id="workoutError" class="error-msg"></p>
            </div>
            <div id="workoutsList"></div>
        </div>

        <div id="tabStats" class="tab-content hidden">
            <div class="card"><h3>Анализ прогресса</h3><select id="statsExerciseSelect"></select>
                <div class="time-buttons" style="display:flex; gap:8px; margin:12px 0;">
                    <button data-period="week" class="period-stats-btn active">Неделя</button>
                    <button data-period="month" class="period-stats-btn">Месяц</button>
                    <button data-period="year" class="period-stats-btn">Год</button>
                </div>
                <canvas id="statsChart" height="200"></canvas>
                <div class="stat-numbers" id="statsNumbers"></div>
            </div>
        </div>

        <!-- ПЛАН ТРЕНИРОВОК С УПРАЖНЕНИЯМИ -->
        <div id="tabPlan" class="tab-content hidden">
            <div class="card">
                <h3>📅 Расписание на неделю</h3>
                <div id="weekPlanContainer"></div>
                <button id="editPlanBtn" class="btn-outline">✏️ Редактировать план</button>
                <div id="planEditor" class="hidden" style="margin-top:15px;">
                    <div id="planDaysEditor"></div>
                    <button id="savePlanBtn">Сохранить</button>
                    <button id="cancelPlanBtn" class="btn-outline">Отмена</button>
                </div>
            </div>
        </div>

        <div id="tabBody" class="tab-content hidden">
            <div class="card"><h3>📏 Измерения тела (см)</h3><button id="addMeasureBtn" class="btn-add">+ Добавить замер</button>
                <div id="measureForm" class="hidden" style="margin-top:15px;"><input type="date" id="measureDate">
                    <div class="measure-row"><label>Грудь</label><input type="number" id="measureChest" placeholder="см"></div>
                    <div class="measure-row"><label>Бицепс (л)</label><input type="number" id="measureBicepsL" placeholder="см"></div>
                    <div class="measure-row"><label>Бицепс (п)</label><input type="number" id="measureBicepsR" placeholder="см"></div>
                    <div class="measure-row"><label>Талия</label><input type="number" id="measureWaist" placeholder="см"></div>
                    <div class="measure-row"><label>Бедро (л)</label><input type="number" id="measureThighL" placeholder="см"></div>
                    <div class="measure-row"><label>Бедро (п)</label><input type="number" id="measureThighR" placeholder="см"></div>
                    <button id="saveMeasureBtn">Сохранить</button><button id="cancelMeasureBtn" class="btn-outline">Отмена</button>
                </div>
                <div id="measuresHistory" style="margin-top:20px;"></div>
            </div>
        </div>

        <div id="tabMuscles" class="tab-content hidden">
            <div class="card"><h3>💪 Управление группами мышц</h3>
                <div class="add-group"><input type="text" id="newGroupName" placeholder="Новая группа"><button id="addGroupBtn" class="small-btn">+ Добавить</button></div>
                <div id="musclesContainer"></div>
            </div>
        </div>

        <div id="tabFavorites" class="tab-content hidden">
            <div class="card"><h3>⭐ Избранные упражнения</h3><div id="favoritesList"></div></div>
        </div>
    </div>
</div>

<script type="module">
    // ==================== FIREBASE КОНФИГ (ВСТАВЬТЕ ВАШ) ====================
    const firebaseConfig = {
        apiKey: "ВАШ_API_KEY",
        authDomain: "ВАШ_AUTH_DOMAIN",
        databaseURL: "https://ВАШ_PROJECT_ID-default-rtdb.firebaseio.com/",
        projectId: "ВАШ_PROJECT_ID",
        storageBucket: "ВАШ_STORAGE_BUCKET",
        messagingSenderId: "ВАШ_SENDER_ID",
        appId: "ВАШ_APP_ID"
    };
    // ========================================================================
    
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getDatabase, ref, get, set, onValue } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';
    
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    let currentUsername = null;
    let currentUserData = null;
    let currentEditIndex = null;
    let statsChart = null;
    let currentPeriod = 'week';
    let isSyncing = false;
    let unsubscribeRealtime = null;
    
    // DOM элементы
    const authPage = document.getElementById('authPage'), appPage = document.getElementById('appPage');
    const loginForm = document.getElementById('loginForm'), registerForm = document.getElementById('registerForm');
    const loginTabBtn = document.getElementById('loginTabBtn'), registerTabBtn = document.getElementById('registerTabBtn');
    const doLoginBtn = document.getElementById('doLoginBtn'), doRegisterBtn = document.getElementById('doRegisterBtn');
    const authError = document.getElementById('authError'), regError = document.getElementById('regError');
    const logoutBtn = document.getElementById('logoutBtn');
    const currentUserSpan = document.getElementById('currentUser'), syncStatus = document.getElementById('syncStatus');
    const workoutsListDiv = document.getElementById('workoutsList'), workoutForm = document.getElementById('workoutForm');
    const showWorkoutFormBtn = document.getElementById('showWorkoutFormBtn'), saveWorkoutBtn = document.getElementById('saveWorkoutBtn');
    const cancelWorkoutBtn = document.getElementById('cancelWorkoutBtn'), workoutMuscleGroup = document.getElementById('workoutMuscleGroup');
    const workoutExerciseSelect = document.getElementById('workoutExerciseSelect'), workoutDate = document.getElementById('workoutDate');
    const setsContainer = document.getElementById('setsContainer'), addSetBtn = document.getElementById('addSetBtn');
    const workoutPhoto = document.getElementById('workoutPhoto'), photoPreview = document.getElementById('photoPreview');
    const workoutError = document.getElementById('workoutError'), statsExerciseSelect = document.getElementById('statsExerciseSelect');
    const periodBtns = document.querySelectorAll('.period-stats-btn'), statsChartCanvas = document.getElementById('statsChart');
    const statsNumbers = document.getElementById('statsNumbers'), musclesContainer = document.getElementById('musclesContainer');
    const addGroupBtn = document.getElementById('addGroupBtn'), newGroupName = document.getElementById('newGroupName');
    const favoritesList = document.getElementById('favoritesList'), weekPlanContainer = document.getElementById('weekPlanContainer');
    const editPlanBtn = document.getElementById('editPlanBtn'), planEditor = document.getElementById('planEditor');
    const planDaysEditor = document.getElementById('planDaysEditor'), savePlanBtn = document.getElementById('savePlanBtn');
    const cancelPlanBtn = document.getElementById('cancelPlanBtn'), addMeasureBtn = document.getElementById('addMeasureBtn');
    const measureForm = document.getElementById('measureForm'), saveMeasureBtn = document.getElementById('saveMeasureBtn');
    const cancelMeasureBtn = document.getElementById('cancelMeasureBtn'), measuresHistory = document.getElementById('measuresHistory');
    const measureDate = document.getElementById('measureDate'), measureChest = document.getElementById('measureChest');
    const measureBicepsL = document.getElementById('measureBicepsL'), measureBicepsR = document.getElementById('measureBicepsR');
    const measureWaist = document.getElementById('measureWaist'), measureThighL = document.getElementById('measureThighL');
    const measureThighR = document.getElementById('measureThighR');
    
    const tabs = document.querySelectorAll('[data-tab]');
    const tabContents = { exercises: 'tabExercises', stats: 'tabStats', plan: 'tabPlan', body: 'tabBody', muscles: 'tabMuscles', favorites: 'tabFavorites' };
    
    // Вспомогательные функции
    function escapeHtml(s) { if (!s) return ''; return s.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    
    function getPhotoBase64(file) {
        return new Promise(resolve => { if (!file) resolve(null); const reader = new FileReader(); reader.readAsDataURL(file); reader.onload = () => resolve(reader.result); reader.onerror = () => resolve(null); });
    }
    
    function formatDate(d = new Date()) { return d.toISOString().slice(0,10); }
    
    // ==================== РАБОТА С БАЗОЙ ====================
    async function saveUserDataToCloud() {
        if (!currentUsername || !currentUserData || isSyncing) return;
        isSyncing = true;
        try {
            const userRef = ref(db, `users/${currentUsername}`);
            await set(userRef, {
                username: currentUserData.username,
                workouts: currentUserData.workouts || [],
                plan: currentUserData.plan || {},
                bodyMeasures: currentUserData.bodyMeasures || [],
                exercisesByMuscle: currentUserData.exercisesByMuscle || {},
                muscleGroups: currentUserData.muscleGroups || [],
                favorites: currentUserData.favorites || [],
                exerciseImages: currentUserData.exerciseImages || {},
                password: currentUserData.password,
                lastUpdated: Date.now()
            });
            syncStatus.className = 'sync-status';
            syncStatus.innerHTML = '☁️ Синхронизировано';
        } catch(e) { console.error(e); syncStatus.innerHTML = '⚠️ Ошибка'; }
        finally { isSyncing = false; }
    }
    
    function setupRealtimeSync(username) {
        if (unsubscribeRealtime) unsubscribeRealtime();
        const userRef = ref(db, `users/${username}`);
        unsubscribeRealtime = onValue(userRef, (snapshot) => {
            if (snapshot.exists() && !isSyncing) {
                const data = snapshot.val();
                currentUserData = {
                    username: data.username,
                    workouts: data.workouts || [],
                    plan: data.plan || {},
                    bodyMeasures: data.bodyMeasures || [],
                    exercisesByMuscle: data.exercisesByMuscle || {},
                    muscleGroups: data.muscleGroups || [],
                    favorites: data.favorites || [],
                    exerciseImages: data.exerciseImages || {},
                    password: data.password
                };
                refreshAllUI();
                syncStatus.innerHTML = '☁️ Синхронизировано';
            }
        });
    }
    
    // ==================== РЕГИСТРАЦИЯ И ВХОД ====================
    async function registerUser(username, password) {
        if (username.length < 3) return { success: false, error: 'Логин минимум 3 символа' };
        if (password.length < 3) return { success: false, error: 'Пароль минимум 3 символа' };
        try {
            const userRef = ref(db, `users/${username}`);
            const snapshot = await get(userRef);
            if (snapshot.exists()) return { success: false, error: 'Пользователь уже существует' };
            const defaultGroups = ['Груди', 'Спина', 'Ноги', 'Сідниці', 'Плечі', 'Біцепс', 'Тріцепс', 'Прес'];
            const exercisesByMuscle = {};
            for (let g of defaultGroups) exercisesByMuscle[g] = [];
            exercisesByMuscle['Груди'] = ['Жим лёжа', 'Жим гантелей'];
            exercisesByMuscle['Спина'] = ['Тяга штанги', 'Подтягивания'];
            exercisesByMuscle['Ноги'] = ['Приседания', 'Выпады'];
            exercisesByMuscle['Сідниці'] = ['Румунська тяга', 'Ягодичный мост'];
            exercisesByMuscle['Плечі'] = ['Жим штанги стоя', 'Махи гантелями'];
            exercisesByMuscle['Біцепс'] = ['Подъём штанги', 'Молотки'];
            exercisesByMuscle['Тріцепс'] = ['Французский жим', 'Разгибания'];
            exercisesByMuscle['Прес'] = ['Скручивания', 'Планка'];
            
            // Пустой план для каждого дня
            const emptyPlan = {
                'Понедельник': [], 'Вторник': [], 'Среда': [], 'Четверг': [], 'Пятница': [], 'Суббота': [], 'Воскресенье': []
            };
            
            await set(userRef, {
                username, password,
                workouts: [],
                plan: emptyPlan,
                bodyMeasures: [],
                exercisesByMuscle: exercisesByMuscle,
                muscleGroups: defaultGroups,
                favorites: ['Жим лёжа', 'Приседания'],
                exerciseImages: {},
                created: Date.now()
            });
            return { success: true };
        } catch(e) { console.error(e); return { success: false, error: 'Ошибка сервера' }; }
    }
    
    async function loginUser(username, password) {
        try {
            const userRef = ref(db, `users/${username}`);
            const snapshot = await get(userRef);
            if (!snapshot.exists()) return { success: false, error: 'Пользователь не найден' };
            if (snapshot.val().password !== password) return { success: false, error: 'Неверный пароль' };
            return { success: true };
        } catch(e) { return { success: false, error: 'Ошибка сервера' }; }
    }
    
    // ==================== РАБОТА С ДАННЫМИ ====================
    function getWorkouts() { return currentUserData?.workouts || []; }
    async function addWorkout(w) { currentUserData.workouts.push(w); await saveUserDataToCloud(); refreshAllUI(); }
    async function updateWorkout(i, w) { currentUserData.workouts[i] = w; await saveUserDataToCloud(); refreshAllUI(); }
    async function deleteWorkout(i) { currentUserData.workouts.splice(i,1); await saveUserDataToCloud(); refreshAllUI(); }
    function getMuscleGroups() { return currentUserData?.muscleGroups || []; }
    function getExercisesByMuscle() { return currentUserData?.exercisesByMuscle || {}; }
    async function addMuscleGroup(g) { if (!currentUserData.muscleGroups.includes(g)) { currentUserData.muscleGroups.push(g); currentUserData.exercisesByMuscle[g] = []; await saveUserDataToCloud(); refreshAllUI(); } }
    async function addExerciseToGroup(g, ex) { if (!currentUserData.exercisesByMuscle[g].includes(ex)) { currentUserData.exercisesByMuscle[g].push(ex); await saveUserDataToCloud(); refreshAllUI(); } }
    function getFavorites() { return currentUserData?.favorites || []; }
    async function toggleFavorite(ex) { let favs = currentUserData.favorites || []; if (favs.includes(ex)) favs = favs.filter(f=>f!==ex); else favs.push(ex); currentUserData.favorites = favs; await saveUserDataToCloud(); refreshAllUI(); }
    function getAllExerciseNames() { const names=[]; for(let g in currentUserData.exercisesByMuscle) names.push(...currentUserData.exercisesByMuscle[g]); return [...new Set(names)]; }
    function getExerciseImage(ex) { return currentUserData?.exerciseImages?.[ex] || null; }
    async function setExerciseImage(ex, url) { if(!currentUserData.exerciseImages) currentUserData.exerciseImages={}; currentUserData.exerciseImages[ex]=url; await saveUserDataToCloud(); }
    function getPlan() { return currentUserData?.plan || { 'Понедельник':[], 'Вторник':[], 'Среда':[], 'Четверг':[], 'Пятница':[], 'Суббота':[], 'Воскресенье':[] }; }
    async function savePlan(p) { currentUserData.plan = p; await saveUserDataToCloud(); refreshAllUI(); }
    function getBodyMeasures() { return currentUserData?.bodyMeasures || []; }
    async function addBodyMeasure(m) { currentUserData.bodyMeasures.push(m); await saveUserDataToCloud(); refreshAllUI(); }
    async function deleteBodyMeasure(date) { currentUserData.bodyMeasures = currentUserData.bodyMeasures.filter(m=>m.date!==date); await saveUserDataToCloud(); refreshAllUI(); }
    function getLastWeightAndReps(ex) { const w = getWorkouts().filter(w=>w.exercise===ex).sort((a,b)=>new Date(b.date)-new Date(a.date))[0]; if(w && w.sets.length) { const ls = w.sets[w.sets.length-1]; return { weight: ls.weight, reps: ls.reps }; } return { weight: 0, reps: 8 }; }
    function getStatsForExercise(ex, period) { const ww = getWorkouts().filter(w=>w.exercise===ex); if(!ww.length) return null; const now=new Date(); let from=new Date(); if(period==='week') from.setDate(now.getDate()-7); else if(period==='month') from.setMonth(now.getMonth()-1); else from.setFullYear(now.getFullYear()-1); const data = ww.filter(w=>new Date(w.date)>=from).sort((a,b)=>new Date(a.date)-new Date(b.date)); if(!data.length) return null; return { labels: data.map(d=>d.date), maxWeights: data.map(d=>Math.max(...d.sets.map(s=>s.weight))), totalVolume: data.reduce((s,d)=>s+d.sets.reduce((vol,set)=>vol+set.weight*set.reps,0),0), avgWeight: data.reduce((s,d)=>s+d.sets.reduce((ws,set)=>ws+set.weight,0)/d.sets.length,0)/data.length, maxAll: Math.max(...data.flatMap(d=>d.sets.map(s=>s.weight))), totalSets: data.reduce((s,d)=>s+d.sets.length,0), dataLength: data.length }; }
    
    // ==================== ПЛАН С УПРАЖНЕНИЯМИ ====================
    function renderPlanUI() {
        const plan = getPlan();
        const days = ['Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница', 'Суббота', 'Воскресенье'];
        weekPlanContainer.innerHTML = days.map(day => {
            const exercises = plan[day] || [];
            const exercisesHtml = exercises.length ? exercises.map((ex, idx) => `<div class="plan-exercise-item"><span>🏋️ ${escapeHtml(ex)}</span></div>`).join('') : '<div style="color:#888; padding:8px;">— Нет упражнений —</div>';
            return `<div class="week-plan-day">
                <strong>📅 ${day}</strong>
                <div style="margin-top:8px;">${exercisesHtml}</div>
            </div>`;
        }).join('');
    }
    
    function openPlanEditor() {
        const plan = getPlan();
        const days = ['Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница', 'Суббота', 'Воскресенье'];
        const groups = getMuscleGroups();
        const byMuscle = getExercisesByMuscle();
        
        planDaysEditor.innerHTML = days.map(day => {
            const exercises = plan[day] || [];
            const exercisesHtml = exercises.map((ex, idx) => `<div class="plan-exercise-item">
                <span>🏋️ ${escapeHtml(ex)}</span>
                <button class="remove-plan-ex small-btn" data-day="${day}" data-ex="${escapeHtml(ex)}" style="background:#ef4444; padding:4px 8px;">✖</button>
            </div>`).join('');
            
            const groupsHtml = groups.map(group => `<optgroup label="${escapeHtml(group)}">${(byMuscle[group]||[]).map(ex => `<option value="${escapeHtml(ex)}">${escapeHtml(ex)}</option>`).join('')}</optgroup>`).join('');
            
            return `<div style="margin-bottom: 20px; border: 1px solid #e2e8f0; border-radius: 20px; padding: 12px;">
                <h4 style="margin-bottom: 10px;">${day}</h4>
                <div id="plan-ex-${day.replace(/\s/g,'')}">${exercisesHtml || '<div style="color:#888;">Нет упражнений</div>'}</div>
                <div class="plan-exercise-add">
                    <select id="plan-select-${day.replace(/\s/g,'')}" style="flex:1;">
                        <option value="">-- Добавить упражнение --</option>
                        ${groupsHtml}
                    </select>
                    <button class="small-btn add-to-plan-btn" data-day="${day}" style="background:#10b981;">+ Добавить</button>
                </div>
            </div>`;
        }).join('');
        
        // Обработчики добавления упражнений
        document.querySelectorAll('.add-to-plan-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const day = btn.dataset.day;
                const select = document.getElementById(`plan-select-${day.replace(/\s/g,'')}`);
                const exName = select.value;
                if (exName) {
                    const newPlan = { ...getPlan() };
                    if (!newPlan[day]) newPlan[day] = [];
                    if (!newPlan[day].includes(exName)) {
                        newPlan[day].push(exName);
                        savePlan(newPlan);
                        openPlanEditor(); // перерисовываем
                    }
                    select.value = '';
                }
            });
        });
        
        // Обработчики удаления упражнений
        document.querySelectorAll('.remove-plan-ex').forEach(btn => {
            btn.addEventListener('click', () => {
                const day = btn.dataset.day;
                const exName = btn.dataset.ex;
                const newPlan = { ...getPlan() };
                newPlan[day] = (newPlan[day] || []).filter(e => e !== exName);
                savePlan(newPlan);
                openPlanEditor();
            });
        });
        
        planEditor.classList.remove('hidden');
    }
    
    // ==================== ОТРИСОВКА ====================
    function renderWorkoutsList() {
        const workouts = getWorkouts();
        if(!workouts.length) { workoutsListDiv.innerHTML = '<div class="form-card">Нет тренировок. Добавьте первую!</div>'; return; }
        workoutsListDiv.innerHTML = workouts.map((w, idx) => `<div class="exercise-card"><div><strong>${escapeHtml(w.exercise)}</strong> 📅 ${w.date}</div><div class="exercise-sets">${w.sets.map((s,i)=>`<div>🔹 Подход ${i+1}: ${s.weight} кг × ${s.reps} повт</div>`).join('')}</div>${w.photoUrl?`<div class="exercise-photo"><img src="${w.photoUrl}"></div>`:''}<div><button class="edit-workout" data-idx="${idx}">✏️</button> <button class="delete-workout" data-idx="${idx}">🗑️</button></div></div>`).join('');
        document.querySelectorAll('.edit-workout').forEach(btn=>btn.addEventListener('click',()=>openEditWorkout(parseInt(btn.dataset.idx))));
        document.querySelectorAll('.delete-workout').forEach(btn=>btn.addEventListener('click',()=>{ if(confirm('Удалить?')) deleteWorkout(parseInt(btn.dataset.idx)); }));
    }
    
    function updateMuscleGroupsSelect() { const g = getMuscleGroups(); workoutMuscleGroup.innerHTML = '<option value="">-- Выберите группу --</option>' + g.map(g=>`<option value="${escapeHtml(g)}">${escapeHtml(g)}</option>`).join(''); }
    function updateExerciseSelectByMuscle(mg) { const ex = getExercisesByMuscle()[mg] || []; workoutExerciseSelect.innerHTML = '<option value="">-- Выберите упражнение --</option>' + ex.map(e=>`<option value="${escapeHtml(e)}">${escapeHtml(e)}</option>`).join(''); }
    
    function renderMuscleGroups() {
        const groups = getMuscleGroups(), byMuscle = getExercisesByMuscle(), favs = getFavorites();
        musclesContainer.innerHTML = groups.map(muscle => `<div class="muscle-group"><div class="muscle-header" data-muscle="${muscle}">💪 ${escapeHtml(muscle)} <span>▼</span></div><div class="muscle-exercises" id="muscle-${muscle.replace(/\s/g,'')}">${(byMuscle[muscle]||[]).map(ex=>`<div class="ex-item"><span>${escapeHtml(ex)}${getExerciseImage(ex)?' 📷':''}</span><button class="favorite-star ${favs.includes(ex)?'active':''}" data-ex="${escapeHtml(ex)}">${favs.includes(ex)?'★':'☆'}</button></div>`).join('') || '<div>Нет упражнений</div>'}<div class="add-ex-to-group"><input type="text" id="newEx-${muscle.replace(/\s/g,'')}" placeholder="Новое упражнение"><button class="small-btn add-ex-btn" data-muscle="${muscle}">+ Добавить</button></div></div></div>`).join('');
        document.querySelectorAll('.muscle-header').forEach(h=>h.addEventListener('click',()=>document.getElementById(`muscle-${h.dataset.muscle.replace(/\s/g,'')}`).classList.toggle('show')));
        document.querySelectorAll('.favorite-star').forEach(s=>s.addEventListener('click',(e)=>{ e.stopPropagation(); toggleFavorite(s.dataset.ex); }));
        document.querySelectorAll('.add-ex-btn').forEach(b=>b.addEventListener('click',()=>{ const m=b.dataset.muscle, input=document.getElementById(`newEx-${m.replace(/\s/g,'')}`), newEx=input.value.trim(); if(newEx){ addExerciseToGroup(m, newEx); input.value=''; } }));
    }
    
    function renderFavoritesList() { const favs=getFavorites(); favoritesList.innerHTML = !favs.length ? '<div class="form-card">⭐ Нет избранных упражнений</div>' : favs.map(ex=>`<div class="exercise-card"><div>⭐ ${escapeHtml(ex)} ${getExerciseImage(ex)?'📷':''}</div><button class="remove-fav" data-ex="${escapeHtml(ex)}">🗑️</button></div>`).join(''); document.querySelectorAll('.remove-fav').forEach(btn=>btn.addEventListener('click',()=>toggleFavorite(btn.dataset.ex))); }
    
    function refreshStatsSelect() { const all = getAllExerciseNames(); statsExerciseSelect.innerHTML = '<option value="">-- Выберите упражнение --</option>' + all.map(ex=>`<option value="${escapeHtml(ex)}">${escapeHtml(ex)}</option>`).join(''); }
    
    function renderBodyMeasuresUI() {
        const measures = getBodyMeasures();
        if(!measures.length) { measuresHistory.innerHTML = '<div class="form-card">📏 Нет замеров тела</div>'; return; }
        measuresHistory.innerHTML = measures.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(m=>`<div class="exercise-card"><div><b>${m.date}</b>: Груд. ${m.chest}см, Биц(л) ${m.bicepsL}см, Биц(п) ${m.bicepsR}см, Тал. ${m.waist}см, Бедр(л) ${m.thighL}см, Бедр(п) ${m.thighR}см</div><button class="delete-measure" data-date="${m.date}">🗑️</button></div>`).join('');
        document.querySelectorAll('.delete-measure').forEach(btn=>btn.addEventListener('click',()=>deleteBodyMeasure(btn.dataset.date)));
    }
    
    function updateChart() {
        const exercise = statsExerciseSelect.value;
        if(!exercise) { statsNumbers.innerHTML = '<div>Выберите упражнение</div>'; if(statsChart) statsChart.destroy(); return; }
        const stats = getStatsForExercise(exercise, currentPeriod);
        if(!stats) { statsNumbers.innerHTML = '<div>Нет данных</div>'; if(statsChart) statsChart.destroy(); return; }
        statsNumbers.innerHTML = `<div class="stat-item"><div class="stat-value">${stats.totalVolume}</div><div>Объём (кг)</div></div><div class="stat-item"><div class="stat-value">${stats.maxAll}</div><div>Макс вес</div></div><div class="stat-item"><div class="stat-value">${stats.avgWeight.toFixed(1)}</div><div>Ср. вес</div></div><div class="stat-item"><div class="stat-value">${stats.totalSets}</div><div>Подходов</div></div>`;
        if(statsChart) statsChart.destroy();
        statsChart = new Chart(statsChartCanvas, { type:'line', data:{ labels: stats.labels, datasets:[{ label:`${exercise} - макс. вес`, data:stats.maxWeights, borderColor:'#3b82f6', fill:false, tension:0.2 }] } });
    }
    
    function addSetRow(weight=0, reps=8) {
        const div = document.createElement('div'); div.className = 'set-row';
        div.innerHTML = `<div class="field"><label>🏋️ Вес (кг)</label><input type="number" class="set-weight" value="${weight}" step="2.5"></div><div class="field"><label>🔄 Повторы</label><input type="number" class="set-reps" value="${reps}"></div><button type="button" class="remove-set-btn">✖ Удалить</button>`;
        div.querySelector('.remove-set-btn').addEventListener('click', () => div.remove());
        setsContainer.appendChild(div);
    }
    
    function resetWorkoutForm() {
        workoutForm.classList.add('hidden'); setsContainer.innerHTML = ''; workoutPhoto.value = ''; photoPreview.innerHTML = ''; workoutError.innerText = '';
        currentEditIndex = null; addSetRow(); workoutMuscleGroup.value = ''; workoutExerciseSelect.innerHTML = '<option value="">-- Выберите упражнение --</option>'; workoutDate.value = formatDate();
    }
    
    async function saveWorkout() {
        const muscleGroup = workoutMuscleGroup.value, exercise = workoutExerciseSelect.value, date = workoutDate.value;
        if(!muscleGroup || !exercise || !date) { workoutError.innerText = '❌ Заполните все поля'; return; }
        const setRows = document.querySelectorAll('#setsContainer .set-row');
        const sets = [];
        for(let row of setRows) {
            const weight = parseFloat(row.querySelector('.set-weight').value);
            const reps = parseInt(row.querySelector('.set-reps').value);
            if(!isNaN(weight) && !isNaN(reps) && weight>0 && reps>0) sets.push({ weight, reps });
        }
        if(sets.length===0) { workoutError.innerText = '❌ Добавьте хотя бы один подход'; return; }
        let photoUrl = null;
        if(workoutPhoto.files.length>0) { photoUrl = await getPhotoBase64(workoutPhoto.files[0]); if(photoUrl) setExerciseImage(exercise, photoUrl); }
        const workout = { exercise, muscleGroup, date, sets, photoUrl };
        if(currentEditIndex !== null) { await updateWorkout(currentEditIndex, workout); currentEditIndex = null; }
        else { await addWorkout(workout); }
        resetWorkoutForm();
    }
    
    function openEditWorkout(index) {
        const workout = getWorkouts()[index];
        currentEditIndex = index;
        workoutMuscleGroup.value = workout.muscleGroup;
        updateExerciseSelectByMuscle(workout.muscleGroup);
        setTimeout(() => { workoutExerciseSelect.value = workout.exercise; }, 50);
        workoutDate.value = workout.date;
        setsContainer.innerHTML = '';
        workout.sets.forEach(set => addSetRow(set.weight, set.reps));
        if(workout.photoUrl) photoPreview.innerHTML = `<img src="${workout.photoUrl}" style="max-width:100px;">`;
        workoutForm.classList.remove('hidden');
    }
    
    function refreshAllUI() {
        if(!currentUserData) return;
        renderWorkoutsList(); renderMuscleGroups(); renderFavoritesList(); refreshStatsSelect();
        updateMuscleGroupsSelect(); renderPlanUI(); renderBodyMeasuresUI(); updateChart();
    }
    
    // ==================== АВТОРИЗАЦИЯ ====================
    async function onLoginSuccess(username) {
        currentUsername = username;
        currentUserSpan.innerText = username;
        const userRef = ref(db, `users/${username}`);
        const snapshot = await get(userRef);
        if(snapshot.exists()) { currentUserData = snapshot.val(); }
        setupRealtimeSync(username);
        authPage.classList.add('hidden'); appPage.classList.remove('hidden');
        workoutDate.value = formatDate(); measureDate.value = formatDate(); setsContainer.innerHTML = ''; addSetRow();
        refreshAllUI();
        
        workoutMuscleGroup.onchange = () => { if(workoutMuscleGroup.value) { updateExerciseSelectByMuscle(workoutMuscleGroup.value); } };
        workoutExerciseSelect.onchange = () => { const ex = workoutExerciseSelect.value; if(ex) { const last = getLastWeightAndReps(ex); if(last.weight>0 && setsContainer.children[0]) { setsContainer.children[0].querySelector('.set-weight').value = last.weight; setsContainer.children[0].querySelector('.set-reps').value = last.reps; } } };
    }
    
    function logoutUser() {
        if(unsubscribeRealtime) unsubscribeRealtime();
        currentUsername = null; currentUserData = null;
        authPage.classList.remove('hidden'); appPage.classList.add('hidden');
        if(statsChart) { statsChart.destroy(); statsChart = null; }
    }
    
    // ==================== СОБЫТИЯ ====================
    doLoginBtn.onclick = async () => {
        const res = await loginUser(document.getElementById('loginUsername').value.trim(), document.getElementById('loginPassword').value);
        if(res.success) onLoginSuccess(document.getElementById('loginUsername').value.trim());
        else authError.innerText = res.error;
    };
    doRegisterBtn.onclick = async () => {
        const res = await registerUser(document.getElementById('regUsername').value.trim(), document.getElementById('regPassword').value);
        if(res.success) { regError.innerText = '✅ Аккаунт создан! Войдите.'; loginTabBtn.click(); document.getElementById('loginUsername').value = document.getElementById('regUsername').value; }
        else regError.innerText = res.error;
    };
    logoutBtn.onclick = logoutUser;
    loginTabBtn.onclick = () => { loginForm.classList.remove('hidden'); registerForm.classList.add('hidden'); loginTabBtn.classList.add('active'); registerTabBtn.classList.remove('active'); };
    registerTabBtn.onclick = () => { registerForm.classList.remove('hidden'); loginForm.classList.add('hidden'); registerTabBtn.classList.add('active'); loginTabBtn.classList.remove('active'); };
    tabs.forEach(btn => btn.onclick = () => { for(let t in tabContents) document.getElementById(tabContents[t]).classList.add('hidden'); document.getElementById(tabContents[btn.dataset.tab]).classList.remove('hidden'); tabs.forEach(b=>b.classList.remove('active')); btn.classList.add('active'); });
    showWorkoutFormBtn.onclick = () => { resetWorkoutForm(); workoutForm.classList.remove('hidden'); };
    addSetBtn.onclick = () => addSetRow();
    saveWorkoutBtn.onclick = saveWorkout;
    cancelWorkoutBtn.onclick = resetWorkoutForm;
    periodBtns.forEach(b => b.onclick = () => { periodBtns.forEach(bb=>bb.classList.remove('active')); b.classList.add('active'); currentPeriod = b.dataset.period; updateChart(); });
    statsExerciseSelect.onchange = updateChart;
    editPlanBtn.onclick = openPlanEditor;
    savePlanBtn.onclick = () => planEditor.classList.add('hidden');
    cancelPlanBtn.onclick = () => planEditor.classList.add('hidden');
    addMeasureBtn.onclick = () => measureForm.classList.remove('hidden');
    saveMeasureBtn.onclick = async () => { const date = measureDate.value; if(!date) return; await addBodyMeasure({ date, chest: parseFloat(measureChest.value)||0, bicepsL: parseFloat(measureBicepsL.value)||0, bicepsR: parseFloat(measureBicepsR.value)||0, waist: parseFloat(measureWaist.value)||0, thighL: parseFloat(measureThighL.value)||0, thighR: parseFloat(measureThighR.value)||0 }); measureForm.classList.add('hidden'); measureChest.value=measureBicepsL.value=measureBicepsR.value=measureWaist.value=measureThighL.value=measureThighR.value=''; };
    cancelMeasureBtn.onclick = () => measureForm.classList.add('hidden');
    addGroupBtn.onclick = async () => { const name = newGroupName.value.trim(); if(name) { await addMuscleGroup(name); newGroupName.value = ''; } };
    workoutPhoto.onchange = (e) => { if(e.target.files.length) { const reader = new FileReader(); reader.onload = (ev) => photoPreview.innerHTML = `<img src="${ev.target.result}" style="max-width:100px;"><button type="button" id="clearPhoto" style="background:#ef4444; padding:4px 8px; margin-left:8px;">✖</button>`; reader.readAsDataURL(e.target.files[0]); setTimeout(()=>{ const clearBtn=document.getElementById('clearPhoto'); if(clearBtn) clearBtn.onclick=()=>{ workoutPhoto.value=''; photoPreview.innerHTML=''; }; },100); } else photoPreview.innerHTML=''; };
    
    if(window.Telegram?.WebApp) { window.Telegram.WebApp.ready(); window.Telegram.WebApp.expand(); }
    authPage.classList.remove('hidden'); appPage.classList.add('hidden');
</script>
</body>
</html>
