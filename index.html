<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Fitness PRO | Трекер тренировок</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
    <!-- СТРАНИЦА АВТОРИЗАЦИИ -->
    <div id="authPage">
        <div class="logo"><h1>💪 Fitness PRO</h1><p>Трекер тренировок | Группы мышц | Избранное</p></div>
        <div class="tabs">
            <button id="loginTabBtn" class="tab-btn active">Вход</button>
            <button id="registerTabBtn" class="tab-btn">Регистрация</button>
        </div>
        <div id="loginForm" class="form-card">
            <input type="text" id="loginUsername" placeholder="Имя пользователя">
            <input type="password" id="loginPassword" placeholder="Пароль">
            <button id="doLoginBtn">Войти</button>
            <p class="error-msg" id="authError"></p>
        </div>
        <div id="registerForm" class="form-card hidden">
            <input type="text" id="regUsername" placeholder="Ник (мин 3)">
            <input type="password" id="regPassword" placeholder="Пароль (мин 3)">
            <button id="doRegisterBtn">Создать аккаунт</button>
            <p class="error-msg" id="regError"></p>
        </div>
    </div>

    <!-- ГЛАВНОЕ ПРИЛОЖЕНИЕ -->
    <div id="appPage" class="hidden">
        <div class="app-header">
            <h2>🏋️ <span id="currentUser"></span></h2>
            <button id="logoutBtn" class="btn-outline">Выйти</button>
        </div>

        <!-- НАВИГАЦИОННЫЕ ВКЛАДКИ -->
        <div class="tabs">
            <button data-tab="exercises" class="tab-btn active">🏋️ Тренировки</button>
            <button data-tab="stats" class="tab-btn">📊 Статистика</button>
            <button data-tab="plan" class="tab-btn">📅 План</button>
            <button data-tab="body" class="tab-btn">📏 Замеры</button>
            <button data-tab="muscles" class="tab-btn">💪 Группы мышц</button>
            <button data-tab="favorites" class="tab-btn">⭐ Избранное</button>
        </div>

        <!-- ВКЛАДКА ТРЕНИРОВКИ -->
        <div id="tabExercises" class="tab-content">
            <button id="showWorkoutFormBtn" class="btn-add" style="background:#10b981;">+ Записать тренировку</button>
            <div id="workoutForm" class="form-card hidden">
                <h3>Новая тренировка</h3>
                <label>Группа мышц</label>
                <select id="workoutMuscleGroup"></select>
                <label>Упражнение</label>
                <select id="workoutExerciseSelect"></select>
                <label>Дата</label>
                <input type="date" id="workoutDate" value="">
                <label>Подходы (сеты)</label>
                <div id="setsContainer"></div>
                <button type="button" id="addSetBtn" class="add-set-btn">+ Добавить подход</button>
                <div class="photo-upload">
                    <label>📸 Фото упражнения (схема)</label>
                    <input type="file" id="workoutPhoto" accept="image/*">
                    <div id="photoPreview"></div>
                </div>
                <div class="form-buttons">
                    <button id="saveWorkoutBtn">Сохранить</button>
                    <button id="cancelWorkoutBtn" class="btn-outline">Отмена</button>
                </div>
                <p id="workoutError" class="error-msg"></p>
            </div>
            <div id="workoutsList" class="exercises-grid" style="margin-top:20px;"></div>
        </div>

        <!-- ВКЛАДКА СТАТИСТИКА -->
        <div id="tabStats" class="tab-content hidden">
            <div class="card">
                <h3>Анализ прогресса</h3>
                <select id="statsExerciseSelect"></select>
                <div class="time-buttons" style="display:flex; gap:8px; margin:12px 0;">
                    <button data-period="week" class="period-stats-btn active">Неделя</button>
                    <button data-period="month" class="period-stats-btn">Месяц</button>
                    <button data-period="year" class="period-stats-btn">Год</button>
                </div>
                <canvas id="statsChart" height="200"></canvas>
                <div class="stat-numbers" id="statsNumbers"></div>
            </div>
        </div>

        <!-- ВКЛАДКА ПЛАН -->
        <div id="tabPlan" class="tab-content hidden">
            <div class="card">
                <h3>📅 Расписание на неделю</h3>
                <div id="weekPlanContainer"></div>
                <button id="editPlanBtn" class="btn-outline">✏️ Редактировать</button>
                <div id="planEditor" class="hidden" style="margin-top:15px;">
                    <div id="planDaysEditor"></div>
                    <button id="savePlanBtn">Сохранить</button>
                    <button id="cancelPlanBtn" class="btn-outline">Отмена</button>
                </div>
            </div>
        </div>

        <!-- ВКЛАДКА ЗАМЕРЫ ТЕЛА -->
        <div id="tabBody" class="tab-content hidden">
            <div class="card">
                <h3>📏 Измерения тела (см)</h3>
                <div id="bodyMeasuresList"></div>
                <button id="addMeasureBtn" class="btn-add">+ Добавить замер</button>
                <div id="measureForm" class="hidden" style="margin-top:15px;">
                    <input type="date" id="measureDate" value="">
                    <div class="body-measure"><label>Грудь</label><input type="number" id="measureChest" placeholder="см"></div>
                    <div class="body-measure"><label>Бицепс (л)</label><input type="number" id="measureBicepsL" placeholder="см"></div>
                    <div class="body-measure"><label>Бицепс (п)</label><input type="number" id="measureBicepsR" placeholder="см"></div>
                    <div class="body-measure"><label>Талия</label><input type="number" id="measureWaist" placeholder="см"></div>
                    <div class="body-measure"><label>Бедро (л)</label><input type="number" id="measureThighL" placeholder="см"></div>
                    <div class="body-measure"><label>Бедро (п)</label><input type="number" id="measureThighR" placeholder="см"></div>
                    <button id="saveMeasureBtn">Сохранить</button>
                    <button id="cancelMeasureBtn" class="btn-outline">Отмена</button>
                </div>
                <div id="measuresHistory" style="margin-top:20px;"></div>
            </div>
        </div>

        <!-- ВКЛАДКА ГРУППЫ МЫШЦ -->
        <div id="tabMuscles" class="tab-content hidden">
            <div class="card">
                <h3>💪 Управление группами мышц</h3>
                <div class="add-group-section">
                    <input type="text" id="newGroupName" placeholder="Название новой группы">
                    <button id="addGroupBtn" class="small-btn">+ Добавить группу</button>
                </div>
                <div id="musclesContainer"></div>
            </div>
        </div>

        <!-- ВКЛАДКА ИЗБРАННОЕ -->
        <div id="tabFavorites" class="tab-content hidden">
            <div class="card">
                <h3>⭐ Избранные упражнения</h3>
                <div id="favoritesList"></div>
            </div>
        </div>
    </div>
</div>
<script type="module" src="app.js"></script>
</body>
</html>
